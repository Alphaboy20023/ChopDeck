{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Menu</title>
    <link rel="stylesheet" href="{% static 'css/index.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
</head>

<body>
    <nav
        class="w-full mx-auto flex items-center justify-between p-5 text-white sticky top-0 z-50 bg-red-800 shadow-md">
        <!-- Logo -->
        <div class="text-3xl font-bold">ChopDeck</div>

        <!-- Menu Button (mobile) -->
        <button id="menu-btn" class="lg:hidden text-2xl focus:outline-none">
            ☰
        </button>

        <!-- Links -->
        <ul id="menu" class="hidden lg:flex space-x-6 text-xl">
            <li><a href="{% url 'index' %}" class="hover:text-blue-600">Home</a></li>
            <li><a href="{% url 'menu' %}" class="hover:text-blue-600">Menu</a></li>
            <li><a href="{% url 'about' %}" class="hover:text-blue-600">About</a></li>
            <li><a href="{% url 'blog' %}" class="hover:text-blue-600">Blog</a></li>
            <li><a href="{% url 'contact' %}" class="hover:text-blue-600">Contact Us</a></li>
        </ul>
    </nav>

    <!-- Mobile Dropdown -->
    <div id="mobile-menu" class="lg:hidden hidden px-4 pb-4 text-white text-xl">
        <ul class="flex flex-col space-y-3">
            <li><a href="{% url 'index' %}" class="block hover:text-blue-600">Home</a></li>
            <li><a href="{% url 'menu' %}" class="block hover:text-blue-600">Menu</a></li>
            <li><a href="{% url 'about' %}" class="block hover:text-blue-600">About</a></li>
            <li><a href="{% url 'blog' %}" class="block hover:text-blue-600">Blog</a></li>
            <li><a href="{% url 'contact' %}" class="block hover:text-blue-600">Contact Us</a></li>
        </ul>
    </div>




    <button id="chatBtn"
        class="fixed bottom-4 right-4 sm:bottom-6 sm:right-6 z-[1000] bg-green-600 p-2 sm:p-3 rounded-full shadow-md text-white font-bold text-2xl">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
            class="lucide lucide-message-square-icon lucide-message-square">
            <path
                d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z" />
        </svg>
    </button>
    <div id="chatModal"
        class="fixed top-0 right-0 h-screen w-full sm:w-80 bg-white transform translate-x-full transition-transform z-[1050] flex flex-col">

        <!-- Modal Header -->
        <div class="p-4 border-b flex justify-between items-center">
            <h2 class="text-lg font-semibold">ChopDeck AI</h2>
            <button id="closeBtn" class="text-gray-500 hover:text-gray-800 text-4xl leading-none">&times;</button>
        </div>

        <!-- Modal Body -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Chat area -->
            <div class="flex-1 overflow-y-auto p-4 space-y-3">
                <!-- Person A -->
                <div class="flex">
                    <div class="bg-gray-200 text-gray-800 px-4 py-2 rounded-2xl rounded-bl-none max-w-[80%]">
                        Hey! I am ChopDeck Assistant, What would you like to order today?
                    </div>
                </div>

                <!-- Person B -->
                <div class="flex justify-end">
                    <div class="bg-blue-600 text-white px-4 py-2 rounded-2xl rounded-br-none max-w-[80%]">
                        I’m good, just working on my project. You?
                    </div>
                </div>
            </div>

            <!-- Input area pinned at bottom -->
            <div class="p-3 border-t flex items-center">
                <input type="text" placeholder="Type a message..."
                    class="flex-1 rounded-lg p-2 border border-gray-300 focus:outline-none focus:ring-2 focus:ring-blue-500">
                <button class="ml-2 bg-blue-600 text-white px-4 py-2 rounded-lg">Send</button>
            </div>
        </div>
    </div>

    <script src="{% static 'js/scripts.js' %}"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
    <script>
        AOS.init({
            duration: 1000,   // animation duration (ms)
            once: true,       // whether animation should happen only once
        });
    </script>
</body>

</html>
